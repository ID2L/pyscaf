# Jupyter Tools Configuration

[tool.pyscaf.jupyter_tools]
# Default output directories
python_notebook_dir = "notebooks/python"
jupyter_notebook_dir = "notebooks/ipynb"
pdf_dir = "generated/pdfs"
html_dir = "generated/html"

# notebook_to_html.py options
hide_input = false
hide_output = false
template_name = "classic"
template_path = ""
template_file = ""

[tool.pixi.tasks]
# Convenient scripts
py-to-nb = { cmd = "python -m pyscaf.jupyter_tools.scripts.py_to_notebook", default-environment = "dev" }
exec-nb = { cmd = "python -m pyscaf.jupyter_tools.scripts.execute_notebook", default-environment = "dev" }
nb-to-html = { cmd = "python -m pyscaf.jupyter_tools.scripts.notebook_to_html", default-environment = "dev" }
py-to-nb-all = { cmd = "python -m pyscaf.jupyter_tools.scripts.main py_to_nb_all", default-environment = "dev" }
exec-nb-all = { cmd = "python -m pyscaf.jupyter_tools.scripts.main exec_nb_all", default-environment = "dev" }
nb-to-html-all = { cmd = "python -m pyscaf.jupyter_tools.scripts.main nb_to_html_all", default-environment = "dev" }

[tool.pixi.feature.dev.dependencies]
jupytext = "*"
nbconvert = "*"
tomli = "*"
